name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.20
          cache: true
      - name: Run formatting check
        run: make fmt-check
      - name: Run vet
        run: make vet
      - name: Run tests
        run: make test
